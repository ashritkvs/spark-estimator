<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Estimator" />
<meta name="theme-color" content="#111827" />
<title>Spark Estimator</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="favicon.png" />
<!-- Excel + ZIP export. Runtime-cached by the service worker for offline use. -->
<script defer src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
/* ============================================================
   DESIGN SYSTEM  — hand-written, no framework. Fully offline.
   ============================================================ */
:root{
  --orange:#d2461e; --orange-600:#ea580c; --orange-700:#c2410c;
  --orange-50:#fff5f0; --orange-100:#ffe7da; --orange-200:#fed1bd;
  --ink:#0f1623; --ink-2:#111827; --slate-900:#111827; --slate-700:#374151;
  --slate-500:#6b7280; --slate-400:#9ca3af; --slate-300:#d1d5db;
  --slate-200:#e5e7eb; --slate-100:#f3f4f6; --slate-50:#f8fafc;
  --bg:#eef1f5; --card:#ffffff; --green:#16a34a; --green-50:#f0fdf4;
  --red:#dc2626; --red-50:#fef2f2; --amber:#d97706; --amber-50:#fffbeb;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.08);
  --shadow-lg:0 10px 30px rgba(16,24,40,.12);
  --r:14px; --r-lg:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overscroll-behavior-y:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--slate-900);
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.4;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.tnum{font-variant-numeric:tabular-nums}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}
.safe-b{padding-bottom:max(14px,env(safe-area-inset-bottom))}
.safe-t{padding-top:env(safe-area-inset-top)}
.hidden{display:none!important}
.app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative}

/* ---- Header ---- */
.hdr{background:linear-gradient(160deg,#1b2638,#0e1422);color:#fff;position:sticky;top:0;z-index:20;
  box-shadow:0 4px 16px rgba(0,0,0,.18)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px}
.hdr-top .brand{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--orange-600)}
.icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:#9aa6b8;border-radius:10px}
.icon-btn:active{background:rgba(255,255,255,.08)}
.hdr-body{padding:2px 16px 14px}
.kicker{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--orange-600)}
.total{font-size:42px;font-weight:800;letter-spacing:-.02em;margin:2px 0 0;line-height:1.05}
.subline{display:flex;align-items:center;gap:8px;margin-top:4px}
.subline .nm{font-size:12.5px;color:#9aa6b8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-pencil{color:#6b7688;display:flex}
.progress-row{display:flex;align-items:center;gap:10px;margin-top:11px}
.bar{flex:1;height:6px;background:rgba(255,255,255,.13);border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-600));border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.progress-row .lbl{font-size:11.5px;color:#8b96a8;white-space:nowrap}

/* ---- Room tabs ---- */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--slate-200);position:sticky;top:0;z-index:10}
.tabs.sticky-rooms{top:0}
.tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-start;gap:1px;
  padding:9px 14px;border-bottom:2.5px solid transparent;white-space:nowrap;color:var(--slate-500);position:relative}
.tab .t-name{font-size:13px;font-weight:600}
.tab .t-sub{font-size:11px;color:var(--slate-400);font-weight:600}
.tab.on{border-color:var(--orange);color:var(--orange-700);background:var(--orange-50)}
.tab.on .t-sub{color:var(--orange-600)}
.tab .dot{position:absolute;top:7px;right:6px;width:6px;height:6px;border-radius:99px;background:var(--green)}
.tab-add{flex:0 0 auto;padding:9px 16px;color:var(--orange-600);font-weight:700;font-size:13px;white-space:nowrap}

/* ---- Body ---- */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 13px 120px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 11px}
.sec-head .t{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--slate-400)}
.sec-head .c{font-size:11.5px;color:var(--slate-400);font-weight:600}
.sec-head .rm{color:var(--red);font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:4px}

/* ---- Group card ---- */
.group{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden}
.group.active{box-shadow:0 0 0 1.5px var(--orange-200),var(--shadow)}
.group-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;width:100%;text-align:left;gap:8px}
.group-hd .l{display:flex;align-items:center;gap:10px;min-width:0}
.chev{color:var(--slate-400);display:flex;transition:transform .2s;flex:0 0 auto}
.chev.open{transform:rotate(180deg)}
.group-hd .gl{font-size:14.5px;font-weight:700;color:var(--slate-900)}
.pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;flex:0 0 auto}
.pill.ok{background:var(--green-50);color:var(--green)}
.pill.cnt{background:var(--orange-100);color:var(--orange-700)}
.pill.na{background:var(--slate-100);color:var(--slate-500)}
.group-hd .gt{font-size:15px;font-weight:800;flex:0 0 auto}
.gt.zero{color:var(--slate-300)}
.gt.pos{color:var(--orange-700)}
.group-bd{border-top:1px solid var(--slate-100);padding:9px 11px 12px;display:flex;flex-direction:column;gap:8px}

/* ---- Line item ---- */
.item{background:var(--slate-50);border:1px solid var(--slate-100);border-radius:var(--r);overflow:hidden;transition:box-shadow .15s}
.item.on{background:#fff;box-shadow:0 0 0 1.5px var(--orange-200)}
.item.standalone{background:#fff;box-shadow:var(--shadow);border-color:transparent}
.item-row{display:flex;gap:11px;padding:12px 13px;align-items:flex-start}
.check{flex:0 0 auto;width:26px;height:26px;border-radius:99px;border:2px solid var(--slate-300);background:#fff;
  display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.check.on{background:var(--orange);border-color:var(--orange)}
.item-main{flex:1;min-width:0}
.item-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.item-name{font-size:13.5px;font-weight:600;color:var(--slate-900);line-height:1.3}
.item.off .item-name{color:var(--slate-400)}
.item-tot{font-size:14.5px;font-weight:800;flex:0 0 auto}
.item-tot.zero{color:var(--slate-300)}
.item-tot.pos{color:var(--orange-700)}
.item-meta{font-size:11.5px;color:var(--slate-400);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cost-edit{color:var(--slate-500);border-bottom:1px dashed var(--slate-300);font-weight:600}
.item-x{color:var(--slate-300);padding:2px;display:flex;flex:0 0 auto}
.item-x:active{color:var(--red)}
.expand{margin-top:11px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.qty-wrap{display:flex;align-items:center;gap:8px}
.qty-wrap .ql{font-size:13px;color:var(--slate-500)}
.qinput{border:1px solid var(--slate-200);border-radius:11px;padding:9px 11px;width:104px;text-align:right;
  font-size:17px;font-weight:600;font-variant-numeric:tabular-nums;background:#fff}
.qinput:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-100)}
.note-input{width:100%;margin-top:10px;border:1px solid var(--slate-200);border-radius:11px;padding:9px 12px;font-size:13px;background:#fff;color:var(--slate-700)}
.note-input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-100)}
.note-input::placeholder{color:var(--slate-400)}
.unit-lbl{font-size:12.5px;color:var(--slate-400)}
.yr-input{width:84px;text-align:center;font-size:15px}

/* serial / photo block */
.serial-block{margin-top:11px;padding-top:11px;border-top:1px dashed var(--slate-200)}
.serial-block .sh{font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.photos{display:flex;flex-wrap:wrap;gap:8px}
.photo{position:relative;width:78px;height:78px;border-radius:12px;overflow:hidden;border:1px solid var(--slate-200);flex:0 0 auto}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.photo .px{position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:99px;background:var(--red);color:#fff;
  font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.photo .badge{position:absolute;bottom:0;left:0;right:0;background:rgba(15,22,35,.82);color:#fff;font-size:9px;
  font-weight:700;text-align:center;padding:2px 1px;letter-spacing:.02em}
.add-photo{width:78px;height:78px;border-radius:12px;border:2px dashed var(--orange-200);background:var(--orange-50);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--orange-600);
  font-size:10.5px;font-weight:600;flex:0 0 auto}
.age-note{margin-top:9px;border-radius:11px;padding:9px 11px;font-size:12px;font-weight:500;line-height:1.35}
.age-note.warn{background:var(--red-50);color:var(--red)}
.age-note.ok{background:var(--green-50);color:var(--green)}
.age-note.info{background:var(--amber-50);color:var(--amber)}
.age-note b{font-weight:800}

/* No action row */
.na-row{display:flex;align-items:center;gap:11px;padding:11px 13px;width:100%;text-align:left}
.na-row .na-txt{font-size:13px;font-style:italic;color:var(--slate-400)}
.na-row.on .na-txt{color:var(--orange-700);font-weight:600;font-style:normal}

.add-item-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;
  border:1.5px dashed var(--slate-300);border-radius:var(--r);color:var(--slate-500);font-weight:600;font-size:13px;background:#fff}
.add-item-btn:active{border-color:var(--orange);color:var(--orange-600)}

/* ---- Bottom nav ---- */
.btmnav{position:fixed;left:0;right:0;bottom:0;z-index:15;background:#fff;border-top:1px solid var(--slate-200);
  box-shadow:0 -4px 24px rgba(16,24,40,.08)}
.btmnav-in{max-width:560px;margin:0 auto;display:flex;gap:9px;padding:11px 13px}
.nbtn{flex:1;padding:13px;border-radius:15px;font-weight:700;font-size:13.5px;text-align:center}
.nbtn.ghost{border:2px solid var(--orange);color:var(--orange-700);background:#fff}
.nbtn.ghost:disabled{opacity:.3}
.nbtn.solid{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(210,70,30,.32)}
.nbtn.dark{background:var(--slate-900);color:#fff}

/* ---- Side panel ---- */
.overlay{position:fixed;inset:0;background:rgba(8,12,20,.5);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;left:0;height:100%;width:min(310px,84vw);background:#fff;z-index:50;
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.panel.show{transform:none}
.panel-hd{background:linear-gradient(160deg,#1b2638,#0e1422);color:#fff;padding:env(safe-area-inset-top) 18px 16px;padding-top:max(18px,env(safe-area-inset-top))}
.panel-hd img{height:26px;margin:8px 0 12px;filter:brightness(0) invert(1)}
.panel-hd .ph-row{display:flex;align-items:center;justify-content:space-between}
.panel-hd .ph-row b{font-size:16px}
.panel-list{flex:1;overflow-y:auto}
.pj{display:flex;align-items:stretch;border-bottom:1px solid var(--slate-100)}
.pj.on{background:var(--orange-50)}
.pj .pj-main{flex:1;text-align:left;padding:14px 16px;min-width:0}
.pj .pj-name{font-size:14px;font-weight:600;color:var(--slate-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pj.on .pj-name{color:var(--orange-700)}
.pj .pj-meta{font-size:11.5px;color:var(--slate-400);margin-top:2px}
.pj .pj-tot{font-size:11.5px;color:var(--orange-600);font-weight:700;margin-top:2px}
.pj .pj-acts{display:flex;flex-direction:column;justify-content:center;gap:2px;padding-right:8px}
.pj .pj-acts button{padding:7px;color:var(--slate-400);border-radius:8px}
.pj .pj-acts .del:active{color:var(--red)}
.panel-ft{padding:14px;border-top:1px solid var(--slate-100)}
.btn-primary{width:100%;padding:13px;border-radius:14px;background:var(--orange);color:#fff;font-weight:700;font-size:14px;text-align:center}

/* ---- Sheets / modals ---- */
.sheet-wrap{position:fixed;inset:0;z-index:60;display:none}
.sheet-wrap.show{display:block}
.sheet-bg{position:absolute;inset:0;background:rgba(8,12,20,.55)}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;
  max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);
  animation:slideup .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid var(--slate-100)}
.sheet-hd h2{margin:0;font-size:17px;font-weight:800}
.sheet-bd{overflow-y:auto;padding:18px 20px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.modal-wrap{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:22px}
.modal-wrap.show{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:380px;padding:22px;box-shadow:var(--shadow-lg);position:relative;z-index:1}
.modal h3{margin:0 0 14px;font-size:17px;font-weight:800}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--slate-500);margin-bottom:5px}
.field input,.field select{width:100%;border:1.5px solid var(--slate-200);border-radius:12px;padding:11px 13px;font-size:15px;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-100)}
.row2{display:flex;gap:10px}.row2 > *{flex:1}
.modal-acts{display:flex;gap:10px;margin-top:8px}
.modal-acts button{flex:1;padding:12px;border-radius:12px;font-weight:700;font-size:14px}
.btn-cancel{border:1.5px solid var(--slate-200);color:var(--slate-600)}
.btn-save{background:var(--orange);color:#fff}
.btn-danger{background:var(--red);color:#fff}

/* room type chooser */
.rt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rt{border:1.5px solid var(--slate-200);border-radius:14px;padding:14px 12px;text-align:left}
.rt:active{border-color:var(--orange);background:var(--orange-50)}
.rt .rt-n{font-weight:700;font-size:14px}
.rt .rt-g{font-size:11px;color:var(--slate-400);margin-top:3px;line-height:1.3}
.rt.dis{opacity:.4;pointer-events:none}

/* settings */
.set-card{background:var(--slate-50);border-radius:14px;padding:14px;margin-bottom:14px}
.set-card h4{margin:0 0 4px;font-size:14px;font-weight:800}
.set-card p{margin:0 0 12px;font-size:12.5px;color:var(--slate-500);line-height:1.4}
.upload-lbl{display:block;text-align:center;padding:12px;border-radius:12px;background:var(--orange);color:#fff;font-weight:700;font-size:14px}
.btn-line{width:100%;padding:11px;border-radius:12px;border:1.5px solid var(--slate-200);color:var(--slate-600);font-weight:700;font-size:13px;margin-top:8px}
.status{padding:11px 13px;border-radius:11px;font-size:12.5px;font-weight:600;margin-bottom:12px}
.status.def{background:var(--slate-100);color:var(--slate-500)}
.status.act{background:var(--green-50);color:var(--green)}

/* deal analyzer */
.deal-hero{background:linear-gradient(160deg,#1b2638,#0e1422);color:#fff;border-radius:18px;padding:18px;margin-bottom:16px}
.deal-hero .dl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange-600)}
.deal-hero .dv{font-size:34px;font-weight:800;margin-top:2px;letter-spacing:-.02em}
.deal-hero .dsub{font-size:12px;color:#9aa6b8;margin-top:3px}
.verdict{margin-top:14px;border-radius:12px;padding:12px 14px;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:9px}
.verdict.go{background:rgba(22,163,74,.18);color:#86efac}
.verdict.tight{background:rgba(217,119,6,.18);color:#fcd34d}
.verdict.no{background:rgba(220,38,38,.2);color:#fca5a5}
.deal-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--slate-100);font-size:13.5px}
.deal-line:last-child{border:none}
.deal-line .v{font-weight:700;font-variant-numeric:tabular-nums}
.deal-line .v.neg{color:var(--red)}
.deal-line.grand{font-weight:800;font-size:15px}

/* summary */
.sum-sec{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow);margin-bottom:11px;overflow:hidden}
.sum-sec-hd{display:flex;justify-content:space-between;padding:13px 15px;background:var(--slate-50);border-bottom:1px solid var(--slate-100)}
.sum-sec-hd .sl{font-weight:700;font-size:13.5px}
.sum-sec-hd .st{font-weight:800;color:var(--orange-700)}
.sum-row{display:flex;justify-content:space-between;padding:9px 15px;font-size:13px;border-bottom:1px solid var(--slate-50)}
.sum-row .sn{color:var(--slate-600)}.sum-row .sn small{color:var(--slate-400);font-weight:600}
.sum-row .sv{font-weight:700;font-variant-numeric:tabular-nums}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--slate-900);color:#fff;
  padding:11px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:90;box-shadow:var(--shadow-lg);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:99px;
  display:inline-block;animation:spin .7s linear infinite}
.spinner.dark{border-color:var(--slate-200);border-top-color:var(--orange)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--slate-400);padding:60px 24px;font-size:14px}

/* ---- polish pass: icons, tactile feedback, summary chart ---- */
.tab .t-ico{display:flex;justify-content:center;color:var(--slate-300);margin-bottom:3px}
.tab.on .t-ico{color:var(--orange)}
.sec-head .t{display:flex;align-items:center}
.sec-ico{display:inline-flex;margin-right:7px;color:var(--orange)}
.group-hd .l .g-ico{display:flex;color:var(--slate-300);flex:0 0 auto}
.group.active .group-hd .l .g-ico{color:var(--orange)}
.check,.group-hd,.tab,.tab-add,.nbtn,.add-photo,.btn-primary,.add-item-btn,.na-row,.rt,.icon-btn,.pj-main{transition:transform .12s ease,background .15s,color .15s,border-color .15s,box-shadow .15s}
.group-hd:active,.tab:active,.tab-add:active,.nbtn:active,.add-photo:active,.btn-primary:active,.add-item-btn:active,.na-row:active,.rt:active,.pj-main:active{transform:scale(.985)}
.check:active{transform:scale(.88)}
.nbtn.solid{will-change:transform}
.item{transition:box-shadow .18s ease,background .18s ease}
/* cost-distribution bar (summary) */

/* ============================================================
   3. STORAGE
   ============================================================ */
const K_PROJ='spark_projects_v2', K_GP='spark_global_prices_v1', K_LAST='spark_last_v1';
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true}catch{return false}};

let GLOBAL_PRICES = load(K_GP,{});           // {itemId: cost}
let PROJECTS = load(K_PROJ,[]);              // full project objects

function persistProjects(){
  if(!save(K_PROJ,PROJECTS)){
    // localStorage full (usually photos) — retry stripping photo data URLs
    const lite = PROJECTS.map(p=>({...p, photos:Object.fromEntries(
      Object.entries(p.photos||{}).map(([k,arr])=>[k,arr.map(ph=>({...ph,url:''}))]))}));
    save(K_PROJ,lite);
    toast('Storage full — photos may not all persist');
  }
}

/* ============================================================
   4. STATE  (active project + UI)
   ============================================================ */

const ui={ room:0, view:'main', expanded:{}, };

function blankProject(name){
  return {
    id:'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    name:name||'New Estimate',
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
    rooms:[
      {iid:'r-interior',type:'interior',name:'Interior / General'},
      {iid:'r-kitchen',type:'kitchen',name:'Kitchen'},
      {iid:'r-bath-1',type:'bathroom',name:'Bathroom 1'},
      {iid:'r-systems',type:'systems',name:'Systems & Structure'},
      {iid:'r-exterior',type:'exterior',name:'Exterior'},
    ],
    sel:{},          // 'iid::itemId' -> {q, year}
    photos:{},       // 'iid::itemId' or 'iid::_room' -> [{id,url,serial,year,ts}]
    na:{},           // 'iid::groupKey' -> true (No Action Needed)
    prices:{},       // per-project price override {itemId: cost}
    custom:[],       // [{id, iid, groupKey, n, c, u}]
    removed:{},      // 'iid::itemId' -> true (hidden default items)
    deal:{ arv:'', margin:30, costs:'', offer:'' },
  };
}

/* unit cost resolution: project override → global override → list */
function unitCost(itemId){
  if(P&&P.prices[itemId]!=null) return P.prices[itemId];
  if(GLOBAL_PRICES[itemId]!=null) return GLOBAL_PRICES[itemId];
  const it=itemDef(itemId); return it?it.c:0;
}
function itemDef(itemId){
  if(ITEMS[itemId]) return ITEMS[itemId];
  const cu=P&&P.custom.find(c=>c.id===itemId); return cu?{n:cu.n,c:cu.c,u:cu.u,custom:1}:null;
}
const SID=(iid,itemId)=>iid+'::'+itemId;
function lineTotal(iid,itemId){
  const s=P.sel[SID(iid,itemId)]; if(!s) return 0;
  const q=parseFloat(s.q); if(!(q>0)) return 0;
  return q*unitCost(itemId);
}

/* items visible in a room group (defaults minus removed, plus custom) */
function groupItems(iid,g){
  const base=g.items.filter(id=>!P.removed[SID(iid,id)]);
  const cu=P.custom.filter(c=>c.iid===iid&&c.groupKey===g.key).map(c=>c.id);
  return base.concat(cu);
}
function roomStandalone(iid,type){
  const base=(ROOM_TYPES[type].standalone||[]).filter(id=>!P.removed[SID(iid,id)]);
  const cu=P.custom.filter(c=>c.iid===iid&&c.groupKey==='_standalone').map(c=>c.id);
  return base.concat(cu);
}

/* ---- totals ---- */
function groupTotal(iid,g){ return groupItems(iid,g).reduce((t,id)=>t+lineTotal(iid,id),0); }
function roomTotal(r){
  let t=0; const T=ROOM_TYPES[r.type];
  T.groups.forEach(g=>t+=groupTotal(r.iid,g));
  roomStandalone(r.iid,r.type).forEach(id=>t+=lineTotal(r.iid,id));
  return t;
}
function grandTotal(){ return P?P.rooms.reduce((t,r)=>t+roomTotal(r),0):0; }

/* progress: each group is one unit (checked if any item checked OR No-Action);
   each standalone item is its own unit. */
function progress(){
  let total=0,done=0;
  P.rooms.forEach(r=>{
    const T=ROOM_TYPES[r.type];
    T.groups.forEach(g=>{
      total++;
      const anyChecked=groupItems(r.iid,g).some(id=>P.sel[SID(r.iid,id)]?.on);
      if(anyChecked||P.na[r.iid+'::'+g.key]) done++;
    });
    roomStandalone(r.iid,r.type).forEach(id=>{ total++; if(P.sel[SID(r.iid,id)]?.on) done++; });
  });
  return {total,done,pct:total?Math.round(done/total*100):0};
}
function roomChecked(r){
  const T=ROOM_TYPES[r.type]; let n=0;
  T.groups.forEach(g=>groupItems(r.iid,g).forEach(id=>{if(P.sel[SID(r.iid,id)]?.on)n++}));
  roomStandalone(r.iid,r.type).forEach(id=>{if(P.sel[SID(r.iid,id)]?.on)n++});
  return n;
}

/* ============================================================
   7. RENDER
   ============================================================ */
const $=s=>document.querySelector(s);
const app=$('#app');

function render(){
  if(ui.view==='deal') app.innerHTML=viewDeal();
  else if(ui.view==='summary') app.innerHTML=viewSummary();
  else app.innerHTML=viewMain();
}

function header(){
  const g=grandTotal(), pr=progress();
  const active=P.rooms.filter(r=>roomTotal(r)>0).length;
  return `<header class="hdr safe-t">
    <div class="hdr-top">
      <button class="icon-btn" data-act="open-panel" aria-label="Projects">${I.menu}</button>
      <span class="brand">SPARK ESTIMATOR</span>
      <div style="display:flex">
        <button class="icon-btn" data-act="open-deal" aria-label="Deal analyzer">${I.chart}</button>
        <button class="icon-btn" data-act="open-settings" aria-label="Settings">${I.gear}</button>
      </div>
    </div>
    <div class="hdr-body">
      <div class="kicker">Running Total</div>
      <div class="total tnum" id="run-total">${money(g)}</div>
      <div class="subline">
        <span class="nm">${esc(P.name)} · ${active} active section${active!==1?'s':''}</span>
        <button class="mini-pencil" data-act="rename-project">${I.pencil}</button>
      </div>
      <div class="progress-row">
        <div class="bar"><i id="prog-fill" style="width:${pr.pct}%"></i></div>
        <span class="lbl" id="prog-lbl">${pr.done}/${pr.total} complete</span>
      </div>
    </div>
  </header>`;
}

function roomTabs(){
  return `<nav class="tabs scroll-x" id="room-tabs">
    ${P.rooms.map((r,i)=>{
      const t=roomTotal(r), c=roomChecked(r), on=i===ui.room;
      return `<button class="tab ${on?'on':''}" data-act="room" data-i="${i}">
        ${c>0?'<span class="dot"></span>':''}
        <span class="t-ico">${ricon(r.type,18)}</span>
        <span class="t-name">${esc(r.name)}</span>
        <span class="t-sub">${t>0?money(t):(c>0?c+' ✓':ROOM_TYPES[r.type].groups.length+' groups')}</span>
      </button>`;
    }).join('')}
    <button class="tab-add" data-act="add-room">+ Room</button>
  </nav>`;
}

function viewMain(){
  const r=P.rooms[ui.room]||P.rooms[0];
  const T=ROOM_TYPES[r.type];
  const canRemove=P.rooms.length>1;
  let html=header()+roomTabs()+`<div class="body" id="body">
    <div class="sec-head">
      <span class="t"><span class="sec-ico">${ricon(r.type,16)}</span>${esc(r.name)}</span>
      ${canRemove?`<button class="rm" data-act="remove-room" data-iid="${r.iid}">${I.trash} Remove room</button>`
        :`<span class="c">${T.groups.length} groups</span>`}
    </div>`;
  T.groups.forEach(g=>{ html+=renderGroup(r,g); });
  const sa=roomStandalone(r.iid,r.type);
  if(sa.length){
    html+=`<div class="sec-head" style="margin-top:16px"><span class="t">Other — ${esc(r.name)}</span></div>`;
    sa.forEach(id=>{ html+=renderItem(r.iid,id,true); });
    html+=`<button class="add-item-btn" data-act="add-item" data-iid="${r.iid}" data-g="_standalone">+ Add custom item</button>`;
  }
  html+=`</div>`+bottomNav();
  return html;
}

function renderGroup(r,g){
  const iid=r.iid, gk=iid+'::'+g.key;
  const items=groupItems(iid,g);
  const open=ui.expanded[gk];
  const checked=items.filter(id=>P.sel[SID(iid,id)]?.on).length;
  const tot=groupTotal(iid,g);
  const isNA=P.na[gk];
  let pill='';
  if(checked>0) pill=`<span class="pill cnt">${checked} ✓</span>`;
  else if(isNA) pill=`<span class="pill na">No action</span>`;
  return `<div class="group ${checked>0||isNA?'active':''}" data-gid="${gk}">
    <button class="group-hd" data-act="toggle-group" data-gk="${gk}">
      <span class="l"><span class="chev ${open?'open':''}">${I.chev}</span>
        ${gicon(g.key)}<span class="gl">${g.label}</span>${pill}</span>
      <span class="gt ${tot>0?'pos':'zero'}" data-gt="${gk}">${tot>0?money(tot):'—'}</span>
    </button>
    ${open?`<div class="group-bd">
      ${naRow(gk,isNA)}
      ${items.map(id=>renderItem(iid,id,false)).join('')}
      <button class="add-item-btn" data-act="add-item" data-iid="${iid}" data-g="${g.key}">+ Add custom item</button>
    </div>`:''}
  </div>`;
}

function naRow(gk,on){
  return `<button class="na-row item ${on?'on':''}" data-act="toggle-na" data-gk="${gk}" style="background:${on?'var(--orange-50)':'var(--slate-50)'}">
    <span class="check ${on?'on':''}">${on?I.check:''}</span>
    <span class="na-txt">No action needed — reviewed</span>
  </button>`;
}

function renderItem(iid,itemId,standalone){
  const it=itemDef(itemId); if(!it) return '';
  const sid=SID(iid,itemId), s=P.sel[sid]||{}, on=!!s.on;
  const tot=lineTotal(iid,itemId);
  const cost=unitCost(itemId);
  const note=it.note;
  return `<div class="item ${on?'on':'off'} ${standalone?'standalone':''}" data-item="${sid}">
    <div class="item-row">
      <button class="check ${on?'on':''}" data-act="toggle-item" data-sid="${sid}" data-iid="${iid}" data-id="${itemId}">${on?I.check:''}</button>
      <div class="item-main">
        <div class="item-top">
          <span class="item-name">${esc(it.n)}</span>
          <span class="item-tot ${tot>0?'pos':'zero'}" data-lt="${sid}">${tot>0?money(tot):'—'}</span>
        </div>
        <div class="item-meta">
          <button class="cost-edit" data-act="edit-cost" data-id="${itemId}">${money2(cost)} / ${esc(it.u)}</button>
          ${note?`<span>· ${esc(note)}</span>`:''}
          <span style="flex:1"></span>
          <button class="item-x" data-act="remove-item" data-iid="${iid}" data-id="${itemId}" title="Remove">${I.trash}</button>
        </div>
        ${on?itemExpand(iid,itemId,it,s,sid):''}
      </div>
    </div>
  </div>`;
}

function itemExpand(iid,itemId,it,s,sid){
  let h=`<div class="expand">
    <div class="qty-wrap">
      <span class="ql">Qty</span>
      <input class="qinput" data-act="qty" data-sid="${sid}" data-iid="${iid}" data-id="${itemId}"
        type="number" inputmode="decimal" min="0" step="any" value="${s.q??''}" placeholder="0" />
      <span class="unit-lbl">${esc(it.u)}</span>
    </div>`;
  if(it.serial){
    h+=`<div class="qty-wrap">
      <span class="ql">Year</span>
      <input class="qinput yr-input" data-act="year" data-sid="${sid}" type="number" inputmode="numeric"
        min="1970" max="${new Date().getFullYear()}" value="${s.year??''}" placeholder="—" />
    </div>`;
  }
  h+=`</div>`;
  // Notes — every line item (required: each project stores its own notes)
  h+=`<input class="note-input" data-act="note" data-sid="${sid}" value="${esc(s.note||'')}"
        placeholder="Add a note — condition, location, reminder…" />`;
  // Photos — every line item (camera capture). Serial items also get OCR + age check.
  h+=attachBlock(iid,itemId,it,s,sid);
  return h;
}

/* ---- Photos + (for equipment) serial OCR / age block ---- */
function attachBlock(iid,itemId,it,s,sid){
  const photos=P.photos[sid]||[];
  const key=sid.replace(/[^a-z0-9]/gi,'');
  const heading=it.serial?`${I.cam} Serial photo &amp; age check`:`${I.cam} Photos`;
  return `<div class="serial-block">
    <div class="sh">${heading}</div>
    <div class="photos">
      ${photos.map((ph,i)=>`<div class="photo">
        <img src="${ph.url}" alt="photo"/>
        <button class="px" data-act="rm-photo" data-sid="${sid}" data-i="${i}">×</button>
        ${ph.serial?`<span class="badge">${esc(ph.serial.slice(0,12))}</span>`:''}
      </div>`).join('')}
      <button class="add-photo" data-act="add-photo" data-sid="${sid}" data-id="${itemId}">${I.cam}<span>${it.serial?'Scan':'Photo'}</span></button>
    </div>
    ${it.serial?`<div id="ocr-${key}"></div><div id="age-${key}">${ageNote(it,s)}</div>`:''}
  </div>`;
}

/* age decoder note (Creative Feature #1) — only for serial-bearing equipment */
function ageNote(it,s){
  if(!s.year) return '';
  const age=new Date().getFullYear()-Number(s.year);
  if(!(age>=0&&age<60)) return '';
  const life=it.life||15, left=life-age;
  if(left<=1) return `<div class="age-note warn">⚠ <b>${age} yrs old</b> — past its ~${life}-yr service life. Budget a replacement; this is exactly the kind of hidden cost that sinks a flip.</div>`;
  if(left<=4) return `<div class="age-note info">○ <b>${age} yrs old</b> — roughly ${left} yr${left!==1?'s':''} of life left. Inspect closely and consider replacing now.</div>`;
  return `<div class="age-note ok">✓ <b>${age} yrs old</b> — about ${left} yrs of life remaining. Likely fine.</div>`;
}

function bottomNav(){
  const first=ui.room===0, last=ui.room===P.rooms.length-1;
  return `<div class="btmnav safe-b"><div class="btmnav-in">
    <button class="nbtn ghost" data-act="prev" ${first?'disabled':''}>← Previous</button>
    ${last
      ? `<button class="nbtn solid" data-act="open-summary">Review & Export</button>`
      : `<button class="nbtn solid" data-act="next">Next →</button>`}
  </div></div>`;
}

/* ---- Summary view ---- */
function viewSummary(){
  const g=grandTotal();
  let secs='';
  P.rooms.forEach(r=>{
    const t=roomTotal(r); if(t<=0) return;
    const T=ROOM_TYPES[r.type]; let rows='';
    const addRow=(id)=>{const lt=lineTotal(r.iid,id); if(lt<=0)return; const it=itemDef(id); const s=P.sel[SID(r.iid,id)];
      const ph=(P.photos[SID(r.iid,id)]||[]).length;
      const extra=[s.note?esc(s.note):'', ph?`📷 ${ph}`:''].filter(Boolean).join(' · ');
      rows+=`<div class="sum-row"><span class="sn">${esc(it.n)} <small>· ${s.q} ${esc(it.u)} × ${money2(unitCost(id))}</small>${extra?`<br><small style="color:var(--slate-400)">${extra}</small>`:''}</span><span class="sv">${money(lt)}</span></div>`;};
    T.groups.forEach(gp=>groupItems(r.iid,gp).forEach(addRow));
    roomStandalone(r.iid,r.type).forEach(addRow);
    secs+=`<div class="sum-sec"><div class="sum-sec-hd"><span class="sl">${esc(r.name)}</span><span class="st">${money(t)}</span></div>${rows}</div>`;
  });
  if(!secs) secs=`<div class="empty">No repairs selected yet.<br>Add quantities to line items to build your estimate.</div>`;
  return `<header class="hdr safe-t">
    <div class="hdr-top">
      <button class="icon-btn" data-act="back-main">${I.back}</button>
      <span class="brand">ESTIMATE SUMMARY</span>
      <button class="icon-btn" data-act="open-deal">${I.chart}</button>
    </div>
    <div class="hdr-body"><div class="kicker">Total Estimate</div><div class="total tnum">${money(g)}</div>
    <div class="subline"><span class="nm">${esc(P.name)}</span></div></div>
  </header>
  <div class="body" style="padding-bottom:120px">${distCard(g)}${secs}</div>
  <div class="btmnav safe-b"><div class="btmnav-in">
    <button class="nbtn ghost" data-act="open-deal">Deal Analysis</button>
    <button class="nbtn solid" data-act="export" id="export-btn">⤓ Export ZIP</button>
  </div></div>`;
}

/* cost-distribution bar across rooms (summary) */
const DIST_COLORS=['#d2461e','#ea580c','#f59e0b','#0e7490','#0d9488','#7c3aed','#475569','#b45309','#be123c','#0369a1'];
function distCard(g){
  if(g<=0) return '';
  const segs=P.rooms.map(r=>({name:r.name,total:roomTotal(r)})).filter(s=>s.total>0)
    .sort((a,b)=>b.total-a.total).map((s,i)=>({...s,pct:s.total/g*100,color:DIST_COLORS[i%DIST_COLORS.length]}));
  if(segs.length<=1) return '';
  return `<div class="dist-card">
    <div class="dt">Where the money goes</div>
    <div class="dist">${segs.map(s=>`<span style="width:${s.pct}%;background:${s.color}" title="${esc(s.name)}"></span>`).join('')}</div>
    <div class="dist-legend">${segs.map(s=>`<span class="lg"><span class="sw" style="background:${s.color}"></span>${esc(s.name)} <b>${money(s.total)}</b> <span class="pc">${Math.round(s.pct)}%</span></span>`).join('')}</div>
  </div>`;
}

/* ============================================================
   8. DEAL ANALYZER  (Creative Feature #2)
   ============================================================ */
function viewDeal(){
  const repairs=grandTotal();
  const d=P.deal;
  const arv=parseFloat(d.arv)||0;
  const margin=parseFloat(d.margin)||0;
  const costs=parseFloat(d.costs)||0;
  // Maximum Allowable Offer = ARV·(1-margin) − repairs − holding/closing costs
  const mao=arv>0?Math.max(0, arv*(1-margin/100)-repairs-costs):0;
  const offer=parseFloat(d.offer);
  const hasOffer=!isNaN(offer)&&offer>0;
  const profit=hasOffer?arv-offer-repairs-costs:(arv>0?arv-mao-repairs-costs:0);
  const profitPct=arv>0?profit/arv*100:0;
  let verdict='',vclass='';
  if(arv>0){
    if(!hasOffer){ verdict=`Offer at or below ${money(mao)} to hit your ${margin}% margin.`; vclass='go'; }
    else if(profit>=arv*margin/100){ verdict=`GO — ${money(profit)} projected profit (${profitPct.toFixed(0)}% of ARV).`; vclass='go'; }
    else if(profit>0){ verdict=`TIGHT — only ${money(profit)} profit (${profitPct.toFixed(0)}%). Below your ${margin}% target.`; vclass='tight'; }
    else { verdict=`NO — this deal loses ${money(-profit)} at that price.`; vclass='no'; }
  }
  return `<header class="hdr safe-t">
    <div class="hdr-top"><button class="icon-btn" data-act="back-main">${I.back}</button>
      <span class="brand">DEAL ANALYZER</span><span style="width:38px"></span></div>
    <div class="hdr-body"><div class="kicker">Repair Estimate</div><div class="total tnum">${money(repairs)}</div>
    <div class="subline"><span class="nm">${esc(P.name)}</span></div></div>
  </header>
  <div class="body" style="padding-bottom:40px">
    <div class="deal-hero">
      <div class="dl">Maximum Allowable Offer</div>
      <div class="dv tnum">${arv>0?money(mao):'—'}</div>
      <div class="dsub">Most you can pay and still clear a ${margin||0}% margin after repairs &amp; costs.</div>
      ${arv>0?`<div class="verdict ${vclass}">${verdict}</div>`:''}
    </div>
    <div class="set-card">
      <div class="field"><label>After-Repair Value (ARV) — what it sells for renovated</label>
        <input type="number" inputmode="decimal" data-act="deal" data-f="arv" value="${d.arv}" placeholder="e.g. 210000"/></div>
      <div class="row2">
        <div class="field"><label>Target margin %</label>

function downscale(file,max,q){
  return new Promise(res=>{
    const img=new Image(); const rd=new FileReader();
    rd.onload=()=>{ img.onload=()=>{
      let{width:w,height:h}=img; if(w>max||h>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',q));
    }; img.src=rd.result; };
    rd.readAsDataURL(file);
  });
}

/* lazy-load Tesseract only when first needed */
let _tessP=null;
function loadTesseract(){
  if(_tessP) return _tessP;
  _tessP=new Promise((res,rej)=>{
    if(window.Tesseract) return res(window.Tesseract);
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=()=>res(window.Tesseract); s.onerror=()=>rej(new Error('offline'));
    document.head.appendChild(s);
  });
  return _tessP;
}
function ocrBox(sid){ return document.getElementById('ocr-'+sid.replace(/[^a-z0-9]/gi,'')); }
async function runOCR(sid,itemId,ph){
  const box=ocrBox(sid); if(box) box.innerHTML=`<div class="age-note info"><span class="spinner dark"></span> Reading nameplate for a serial / year…</div>`;
  let T;
  try{ T=await loadTesseract(); }
  catch{ if(box) box.innerHTML=`<div class="age-note info">Offline — OCR needs one online load first. You can type the year manually above.</div>`; return; }
  try{
    const {data}=await T.recognize(ph.url,'eng');
    const text=(data.text||'').replace(/\n/g,' ');
    const dec=decodeSerial(text,itemId);
    ph.serial=dec.serial||''; ph.year=dec.year||'';
    if(dec.year){
      const s=P.sel[sid]=P.sel[sid]||{on:true};
      if(!s.year) s.year=dec.year;
    }
    touch();
    if(box){
      if(dec.year) box.innerHTML=`<div class="age-note ok">Detected <b>${dec.serial?'serial '+esc(dec.serial)+', ':''}</b>manufacture year <b>${dec.year}</b> ${dec.method?'· '+dec.method:''}. Applied above — edit if wrong.</div>`;
      else if(dec.serial) box.innerHTML=`<div class="age-note info">Read serial <b>${esc(dec.serial)}</b> but couldn't decode a year. Enter it manually above.</div>`;
      else box.innerHTML=`<div class="age-note info">No serial detected — try a sharper, closer photo of the metal nameplate, or type the year manually.</div>`;
    }
    if(dec.year) render();
  }catch{ if(box) box.innerHTML=`<div class="age-note info">Couldn't read that photo. Type the year manually above.</div>`; }
}

/* Pragmatic multi-brand serial → manufacture-year decoder.
   Honest best-effort: covers the common HVAC / water-heater patterns,
   always falls back to a plain 4-digit year, user can override. */
function decodeSerial(raw,itemId){
  const text=raw.toUpperCase();
  const yr=new Date().getFullYear();
  // candidate serial = longest alphanumeric run (>=6)
  const runs=(text.match(/[A-Z0-9]{6,}/g)||[]).sort((a,b)=>b.length-a.length);
  const serial=runs[0]||'';
  const plausible=y=>y>=1980&&y<=yr;
  // 1) explicit 4-digit year anywhere
  let m=text.match(/\b(19[89]\d|20[0-4]\d)\b/);
  if(m&&plausible(+m[1])) return {serial,year:+m[1],method:'year on label'};
  if(serial){
    const d4=serial.slice(0,4).replace(/\D/g,'');
    // 2) Carrier / ICP / Heil / Tempstar: WWYY  (week 01-53 + year)
    if(/^\d{4}/.test(serial)){
      const ww=+serial.slice(0,2), yy=+serial.slice(2,4);
      if(ww>=1&&ww<=53){ const y=2000+yy<=yr?2000+yy:1900+yy; if(plausible(y)) return {serial,year:y,method:'Carrier/ICP week-year'}; }
      // 3) Rheem / Ruud / GE: YYWW
      const y2=2000+ +serial.slice(0,2)<=yr?2000+ +serial.slice(0,2):1900+ +serial.slice(0,2);
      const wk=+serial.slice(2,4);
      if(wk>=1&&wk<=53&&plausible(y2)) return {serial,year:y2,method:'Rheem year-week'};
    }
    // 4) Trane / American Standard (post-2002): 1st char = year digit within decade, 2nd = ... hard; try 2-digit
    const yy2=serial.match(/^[A-Z]?(\d{2})/);
    if(yy2){ const y=2000+ +yy2[1]; if(plausible(y)&&y<=yr) return {serial,year:y,method:'2-digit prefix (verify)'}; }
  }
  return {serial,year:null};
}

    </div>`);

    GLOBAL_PRICES={}; save(K_GP,GLOBAL_PRICES); closeLayer('sheet'); render(); toast('Global prices reset');

function importCSV(file){
  if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const rows=parseCSV(rd.result); let n=0;
      rows.forEach(r=>{ const id=(r.id||'').trim(); const c=parseFloat(r.cost);
        if(id&&!isNaN(c)){ GLOBAL_PRICES[id]=c; n++; } });
      save(K_GP,GLOBAL_PRICES); closeLayer('sheet'); render();
      toast(`Updated ${n} price${n!==1?'s':''} globally`);
    }catch{ toast('Could not read that CSV'); }
  };
  rd.readAsText(file);
}
function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  const split=l=>{const o=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];
    if(ch==='"'){ if(q&&l[i+1]==='"'){c+='"';i++;} else q=!q; }
    else if(ch===','&&!q){o.push(c);c='';} else c+=ch;} o.push(c); return o.map(s=>s.trim());};
  const head=split(lines[0]).map(h=>h.toLowerCase());
  return lines.slice(1).map(l=>{const v=split(l);return Object.fromEntries(head.map((h,i)=>[h,v[i]??'']));});
}
function downloadTemplate(){
  let csv='id,name,cost,unit\n';
  Object.entries(ITEMS).forEach(([id,it])=>{ csv+=`${id},"${it.n.replace(/"/g,'""')}",${unitCost(id)},"${it.u}"\n`; });
  const blob=new Blob([csv],{type:'text/csv'}); const u=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=u; a.download='spark-prices.csv'; a.click(); URL.revokeObjectURL(u);
}

    const safe=P.name.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-')||'estimate';
    if(!JSZip){ // fallback: download xlsx only
      dl(new Blob([xlsxData],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),`${safe}-estimate.xlsx`);
      toast('Exported Excel (zip unavailable)'); resetExport(btn); return;
    }
    const zip=new JSZip();
    zip.file(`${safe}-estimate.xlsx`,xlsxData);
    // photos
    const pdir=zip.folder('photos'); let pc=0;
    P.rooms.forEach(r=>{
      const T=ROOM_TYPES[r.type];
      const ids=[...T.groups.flatMap(g=>groupItems(r.iid,g)),...roomStandalone(r.iid,r.type)];
      ids.forEach(id=>{ const arr=P.photos[SID(r.iid,id)]||[];
        arr.forEach((ph,i)=>{ const b64=ph.url.split(',')[1]; if(!b64) return;
          const it=itemDef(id); const nm=`${r.name}-${(it?.n||id)}-${i+1}`.replace(/[^\w-]+/g,'_');
          pdir.file(`${nm}.jpg`,b64,{base64:true}); pc++; }); });
    });
    if(pc===0) zip.remove('photos');
    const content=await zip.generateAsync({type:'blob'});
    dl(content,`${safe}-estimate.zip`);
    toast(`Exported · ${pc} photo${pc!==1?'s':''} included`);
  }catch(err){ console.error(err); toast('Export failed — see console'); }
  resetExport(btn);
}
function resetExport(btn){ if(btn){ btn.innerHTML='⤓ Export ZIP'; btn.disabled=false; } }
function dl(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1500); }

function buildWorkbook(){
  const O='D2461E', INK='111827';
  const head=(t,fill,color)=>({v:t,t:'s',s:{font:{bold:true,sz:11,color:{rgb:color||'FFFFFF'}},fill:{fgColor:{rgb:fill}},alignment:{vertical:'center'}}});
  const cell=(v,o={})=>({v,t:typeof v==='number'?'n':'s',s:Object.assign({font:{sz:10}},o)});
  const rows=[];
  rows.push([cell(P.name,{font:{bold:true,sz:16,color:{rgb:INK}}}),cell(''),cell(''),cell(''),cell('')]);
  rows.push([cell('Repair Cost Estimate · '+new Date().toLocaleDateString(),{font:{sz:10,color:{rgb:'6B7280'}}})]);
  rows.push([]);
  rows.push([head('Section / Room',O),head('Group',O),head('Line Item',O),head('Qty / Unit',O),head('Unit Cost',O),head('Line Total',O),head('Notes',O)]);
  let grand=0;
  P.rooms.forEach(r=>{
    const T=ROOM_TYPES[r.type]; const blocks=[];
    const noteOf=id=>{const s=P.sel[SID(r.iid,id)]||{};const ph=(P.photos[SID(r.iid,id)]||[]).length;
      return [s.note||'', ph?`[${ph} photo${ph>1?'s':''}]`:''].filter(Boolean).join(' ');};
    T.groups.forEach(g=>{ groupItems(r.iid,g).forEach(id=>{ const lt=lineTotal(r.iid,id); if(lt<=0) return;
      const it=itemDef(id),s=P.sel[SID(r.iid,id)]; blocks.push([r.name,g.label,it.n,`${s.q} ${it.u}`,unitCost(id),lt,noteOf(id)]); }); });
    roomStandalone(r.iid,r.type).forEach(id=>{ const lt=lineTotal(r.iid,id); if(lt<=0) return;
      const it=itemDef(id),s=P.sel[SID(r.iid,id)]; blocks.push([r.name,'—',it.n,`${s.q} ${it.u}`,unitCost(id),lt,noteOf(id)]); });
    if(!blocks.length) return;
    let rt=0;
    blocks.forEach(b=>{ rt+=b[5]; grand+=b[5];
      rows.push([cell(b[0]),cell(b[1]),cell(b[2]),cell(b[3]),cell(b[4],{numFmt:'$#,##0.00'}),cell(b[5],{numFmt:'$#,##0',font:{bold:true,sz:10}}),cell(b[6],{font:{sz:9,color:{rgb:'6B7280'}}})]); });
    rows.push([cell(''),cell(''),cell(''),cell(''),cell(r.name+' subtotal',{font:{bold:true,sz:10,color:{rgb:INK}},alignment:{horizontal:'right'}}),cell(rt,{numFmt:'$#,##0',font:{bold:true,sz:10,color:{rgb:'C2410C'}}})]);
  });
  rows.push([]);
  rows.push([cell('GRAND TOTAL',{font:{bold:true,sz:13,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:INK}}}),cell('',{fill:{fgColor:{rgb:INK}}}),cell('',{fill:{fgColor:{rgb:INK}}}),cell('',{fill:{fgColor:{rgb:INK}}}),cell('',{fill:{fgColor:{rgb:INK}}}),cell(grand,{numFmt:'$#,##0',font:{bold:true,sz:13,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:INK}}})]);
  // deal analysis appendix
  const d=P.deal, arv=parseFloat(d.arv)||0;
  if(arv>0){ const costs=parseFloat(d.costs)||0,margin=parseFloat(d.margin)||0;
    const mao=Math.max(0,arv*(1-margin/100)-grand-costs);
    rows.push([]); rows.push([cell('Deal Analysis',{font:{bold:true,sz:12,color:{rgb:INK}}})]);
    rows.push([cell('After-Repair Value'),cell(''),cell(''),cell(''),cell(''),cell(arv,{numFmt:'$#,##0'})]);
    rows.push([cell('Target margin'),cell(''),cell(''),cell(''),cell(''),cell(margin/100,{numFmt:'0%'})]);
    rows.push([cell('Holding & closing'),cell(''),cell(''),cell(''),cell(''),cell(costs,{numFmt:'$#,##0'})]);
    rows.push([cell('Maximum Allowable Offer',{font:{bold:true}}),cell(''),cell(''),cell(''),cell(''),cell(mao,{numFmt:'$#,##0',font:{bold:true,color:{rgb:'C2410C'}}})]);
  }
  const ws=XLSX.utils.aoa_to_sheet(rows.map(r=>r.map(c=>c&&c.v!==undefined?c:cell(c==null?'':c))));
  ws['!cols']=[{wch:20},{wch:20},{wch:38},{wch:16},{wch:12},{wch:13},{wch:30}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Estimate'); return wb;
}

/* ============================================================
   15. MODALS / SHEETS / TOAST
   ============================================================ */
function openModal(title,bodyHTML,onSave,secondary){
  _modalCb=onSave;
  $('#modal-inner').innerHTML=`<h3>${esc(title)}</h3>${bodyHTML}
    <div class="modal-acts">
      ${secondary?`<button class="btn-cancel" id="m-second">${esc(secondary.label)}</button>`:`<button class="btn-cancel" data-x="modal">Cancel</button>`}
      <button class="btn-save" id="m-save">Save</button>
    </div>`;
  $('#modal').classList.add('show');
  const first=$('#modal-inner input'); if(first) setTimeout(()=>{first.focus();first.select&&first.select();},60);
  $('#m-save').onclick=()=>{ const r=onSave&&onSave(); if(r!==false) closeLayer('modal'); };
  if(secondary) $('#m-second').onclick=()=>{ secondary.fn(); closeLayer('modal'); };
  $('#modal-inner').querySelectorAll('input').forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter'){$('#m-save').click();}}));
}
function confirmModal(title,msg,onYes){
  $('#modal-inner').innerHTML=`<h3>${esc(title)}</h3><p style="font-size:13.5px;color:var(--slate-500);margin:0 0 18px">${esc(msg)}</p>
    <div class="modal-acts"><button class="btn-cancel" data-x="modal">Cancel</button><button class="btn-danger" id="m-yes">Delete</button></div>`;
  $('#modal').classList.add('show');
  $('#m-yes').onclick=()=>{ onYes(); closeLayer('modal'); };
}
function openSheet(title,bodyHTML){
  $('#sheet-inner').innerHTML=`<div class="sheet-hd"><h2>${esc(title)}</h2><button class="icon-btn" style="color:var(--slate-400)" data-x="sheet">✕</button></div><div class="sheet-bd">${bodyHTML}</div>`;
  $('#sheet').classList.add('show');
}
function closeLayer(which){
  if(which==='panel'){ $('#panel').classList.remove('show'); $('#overlay').classList.remove('show'); }
  else if(which==='modal'){ $('#modal').classList.remove('show'); }
  else if(which==='sheet'){ $('#sheet').classList.remove('show'); }
}
$('#overlay').addEventListener('click',()=>closeLayer('panel'));
let _toastT;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),2200); }

/* ============================================================
   16. BOOT
   ============================================================ */
function boot(){
  const params=new URLSearchParams(location.search);
  if(params.get('new')==='1'){ const np=blankProject('New Estimate'); PROJECTS.unshift(np); P=np; persistProjects(); }
  else {
    const lastId=load(K_LAST,null);
    P=PROJECTS.find(p=>p.id===lastId)||PROJECTS[0];
    if(!P){ P=blankProject('123 Main St — Demo'); PROJECTS.unshift(P); persistProjects(); }
  }
  // migrate: ensure all expected fields exist
  ['sel','photos','na','prices','removed'].forEach(k=>P[k]=P[k]||{});
  P.custom=P.custom||[]; P.deal=P.deal||{arv:'',margin:30,costs:'',offer:''};
  save(K_LAST,P.id);
  render();
}
boot();

/* service worker */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
